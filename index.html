.tab:hover{color:#94a3b8}

.section-title .badge{font-size:11px;background:rgba(34,211,238,0.15);color:#22d3ee;padding:3px 10px;border-radius:20px;font-weight:700;text-transform:uppercase;letter-spacing:1px}

.ringless-card{padding:18px 20px;border-radius:12px;background:linear-gradient(135deg,rgba(248,113,113,0.06),rgba(255,255,255,0.02));border:1px solid rgba(248,113,113,0.12)}

  .week-summary{grid-template-columns:1fr;gap:8px}
  .dynasty-card,.ringless-card{padding:14px 16px}

async function loadData(){
  const files=['standings','matchups','draft_picks','champions','team_yearly','head_to_head'];

}

function secTitle(title,accent){return `<div class="section-title"><h2>${title}</h2>${accent?`<span class="badge">${accent}</span>`:''}<div class="line"></div></div>`;}

function matchupCard(a,as,h,hs){
  const aw=as>hs;
  return `<div class="matchup-card"><div class="matchup-team ${aw?'winner':'loser'}"><span style="color:${aw?'#e2e8f0':'#64748b'};font-weight:${aw?700:400}">${a}</span><span style="color:${aw?'#22d3ee':'#64748b'};font-weight:700">${as}</span></div><div class="matchup-div"></div><div class="matchup-team ${!aw?'winner':'loser'}"><span style="color:${!aw?'#e2e8f0':'#64748b'};font-weight:${!aw?700:400}">${h}</span><span style="color:${!aw?'#22d3ee':'#64748b'};font-weight:700">${hs}</span></div></div>`;
}

function render(){
  renderTabs();
  const el=document.getElementById('content');
  
  if(state.tab==='Overview')el.innerHTML=renderOverview();
  else if(state.tab==='Champions')el.innerHTML=renderChampions();
  else if(state.tab==='2025 Season')el.innerHTML=render2025();
  else if(state.tab==='Record Book')el.innerHTML=renderRecords();
  else if(state.tab==='Draft History')el.innerHTML=renderDraft();
}

function renderOverview(){
  const st=DATA.standings;
  const totalGames=DATA.matchups.length;
  const totalDraft=DATA.draft_picks.length;
  
  // All-time standings from team_yearly
  const franchises={};
  DATA.team_yearly.forEach(r=>{
    if(!franchises[r.franchise])franchises[r.franchise]={w:0,l:0,t:0,pf:0,pa:0,mgr:r.manager,seasons:0};
    const f=franchises[r.franchise];
    f.w+=r.wins;f.l+=r.losses;f.t+=r.ties;f.pf+=r.points_for;f.pa+=r.points_against;f.seasons++;
    f.mgr=r.manager; // latest manager
  });
  const allTime=Object.entries(franchises).map(([name,d])=>({name,...d,pct:d.w/(d.w+d.l+d.t)})).sort((a,b)=>b.pct-a.pct);

  let html=secTitle('League Stats','Database');
  html+=`<div class="stat-grid">
    <div class="stat-card"><div class="stat-val">19</div><div class="stat-label">Seasons</div><div class="stat-sub">2007-2025</div></div>
    <div class="stat-card"><div class="stat-val">${totalGames.toLocaleString()}</div><div class="stat-label">Games Played</div><div class="stat-sub">Regular + Playoff</div></div>
    <div class="stat-card"><div class="stat-val">${totalDraft.toLocaleString()}</div><div class="stat-label">Draft Picks</div><div class="stat-sub">14 Drafts</div></div>
    <div class="stat-card"><div class="stat-val">15</div><div class="stat-label">Unique Champions</div><div class="stat-sub">Out of 19 Seasons</div></div>
  </div>`;

  html+=secTitle('Multiple Championship Owners','Dynasty');
  html+=`<div class="card-grid">${MULTI.map(mc=>`<div class="dynasty-card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:8px"><div class="num">${mc.t}</div><div><div style="font-size:16px;font-weight:700">${mc.m}</div><div style="font-size:12px;color:#94a3b8">${mc.y}</div></div></div>${mc.n?`<div style="font-size:12px;color:#64748b;font-style:italic">${mc.n}</div>`:''}</div>`).join('')}</div>`;
  html+=`<div style="font-size:11px;color:#475569;margin-top:8px;font-style:italic">* = won with a co-manager/partner</div>`;

  html+=secTitle('Never Won a Championship','Ringless');
  html+=`<div class="card-grid">${NEVERW.map(nw=>`<div class="ringless-card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:6px"><div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,rgba(248,113,113,0.2),rgba(248,113,113,0.05));border:2px solid rgba(248,113,113,0.3);display:flex;align-items:center;justify-content:center;font-size:18px">💀</div><div><div style="font-size:16px;font-weight:700">${nw.m}</div><div style="font-size:12px;color:#94a3b8">${nw.t} — ${nw.s}</div></div></div>${nw.n?`<div style="font-size:12px;color:#f87171;font-style:italic">${nw.n}</div>`:''}</div>`).join('')}</div>`;

  if(allTime.length){
    html+=secTitle('Career Standings','All-Time');
    html+=`<div class="data-table"><div class="header-row" style="display:grid;grid-template-columns:36px 4px 1fr 80px 70px 90px 90px 1fr"><div>#</div><div></div><div>Team</div><div style="text-align:center">Record</div><div style="text-align:center">Win%</div><div style="text-align:right">PF</div><div style="text-align:right">PA</div><div style="text-align:right;padding-right:8px">Manager</div></div>`;
    allTime.forEach((r,i)=>{
      const c=tc(r.name);const p=r.pct.toFixed(3);
      html+=`<div style="display:grid;grid-template-columns:36px 4px 1fr 80px 70px 90px 90px 1fr;align-items:center;padding:10px 16px;${i%2===0?'background:rgba(255,255,255,0.015)':''}"><div style="font-size:13px;color:#64748b;font-weight:700;text-align:center">${i+1}</div><div class="color-bar" style="background:${c}"></div><div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.name}</div><div style="font-size:13px;color:#94a3b8;text-align:center">${r.w}-${r.l}${r.t>0?'-'+r.t:''}</div><div style="font-size:13px;color:${parseFloat(p)>=0.52?'#22d3ee':'#94a3b8'};text-align:center;font-weight:600">${p}</div><div style="font-size:12px;color:#94a3b8;text-align:right">${Math.round(r.pf).toLocaleString()}</div><div style="font-size:12px;color:#64748b;text-align:right">${Math.round(r.pa).toLocaleString()}</div><div style="font-size:11px;color:#475569;text-align:right;padding-right:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.mgr||''}</div></div>`;
    });
    html+=`</div>`;
  }
  return html;
}

function renderChampions(){
  let html=secTitle('League Champions','19 Seasons');
  html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:8px">${[...CHAMPS].reverse().map(ch=>{const c=tc(ch.t);return`<div class="champ-row"><div style="font-size:15px;color:#64748b;font-weight:700;min-width:40px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px">${ch.y}</div><div class="color-bar" style="background:${c};height:32px"></div><div style="flex:1"><div style="font-size:14px;font-weight:600">${ch.t}</div><div style="font-size:12px;color:#64748b">${ch.m}</div></div>${ch.n==='Back-to-back'?'<span style="font-size:10px;background:rgba(250,204,21,0.15);color:#facc15;padding:2px 8px;border-radius:20px;font-weight:700">REPEAT</span>':''}${ch.n==='Left league'?'<span style="font-size:10px;background:rgba(255,255,255,0.05);color:#475569;padding:2px 8px;border-radius:20px;font-weight:600">GONE</span>':''}</div>`;}).join('')}</div>`;
  return html;
}

function render2025(){
  const subTabs=['standings','weekly','playoffs'];
  let html=secTitle('2025 Season','Champion: 1-800-ADMIT-IT');
  html+=`<div class="sub-tabs">${subTabs.map(s=>`<button class="sub-tab ${state.subTab===s?'active':''}" onclick="state.subTab='${s}';render()">${s==='weekly'?'Week-by-Week':s}</button>`).join('')}</div>`;

  if(state.subTab==='standings'){
    const st25=DATA.standings.filter(r=>r.season===2025).sort((a,b)=>a.rank-b.rank);
    html+=`<div class="data-table"><div class="header-row" style="display:grid;grid-template-columns:36px 4px 1fr 70px 70px 90px 90px"><div>#</div><div></div><div>Team</div><div style="text-align:center">Record</div><div style="text-align:center">Win%</div><div style="text-align:right">PF</div><div style="text-align:right">PA</div></div>`;
    st25.forEach((r,i)=>{const c=tc(r.team_name);const p=(r.wins/(r.wins+r.losses)).toFixed(3);
      html+=`<div style="display:grid;grid-template-columns:36px 4px 1fr 70px 70px 90px 90px;align-items:center;padding:10px 16px;${i%2===0?'background:rgba(255,255,255,0.02)':''}"><div style="font-size:14px;color:#64748b;font-weight:700;text-align:center">${r.rank}</div><div class="color-bar" style="background:${c};height:24px"></div><div style="font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.team_name}</div><div style="font-size:13px;color:#94a3b8;text-align:center">${r.wins}-${r.losses}</div><div style="font-size:13px;color:#94a3b8;text-align:center">${p}</div><div style="font-size:13px;color:#22d3ee;text-align:right;font-weight:600">${r.points_for.toFixed(1)}</div><div style="font-size:13px;color:#64748b;text-align:right">${r.points_against.toFixed(1)}</div></div>`;
    });
    html+=`</div>`;
  }

  if(state.subTab==='weekly'){
    const m25=DATA.matchups.filter(r=>r.season===2025&&r.matchup_type==='regular');
    const weeks=[...new Set(m25.map(r=>r.week))].sort((a,b)=>a-b);
    html+=`<div class="week-btns">${weeks.map(w=>`<button class="week-btn ${state.selWeek===w?'active':''}" onclick="state.selWeek=${w};render()">${w}</button>`).join('')}</div>`;
    html+=`<div style="font-size:18px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;margin-bottom:16px">WEEK ${state.selWeek} RESULTS</div>`;
    const wk=m25.filter(r=>r.week===state.selWeek);
    html+=`<div class="matchup-grid">${wk.map(g=>matchupCard(g.team1_name,g.team1_score,g.team2_name,g.team2_score)).join('')}</div>`;
    if(wk.length){
      const scores=wk.flatMap(g=>[{t:g.team1_name,s:g.team1_score},{t:g.team2_name,s:g.team2_score}]);
      const hi=scores.reduce((a,b)=>b.s>a.s?b:a);
      const lo=scores.reduce((a,b)=>b.s<a.s?b:a);
      const diffs=wk.map(g=>Math.abs(g.team1_score-g.team2_score));
      html+=`<div class="week-summary"><div><span style="color:#64748b">Highest: </span><span style="color:#22d3ee;font-weight:700">${hi.s.toFixed(1)}</span> <span style="color:#475569">${hi.t}</span></div><div><span style="color:#64748b">Lowest: </span><span style="color:#f87171;font-weight:700">${lo.s.toFixed(1)}</span> <span style="color:#475569">${lo.t}</span></div><div><span style="color:#64748b">Closest: </span><span style="color:#34d399;font-weight:700">${Math.min(...diffs).toFixed(1)} pts</span></div><div><span style="color:#64748b">Blowout: </span><span style="color:#fb923c;font-weight:700">${Math.max(...diffs).toFixed(1)} pts</span></div></div>`;
    }
  }

  if(state.subTab==='playoffs'){
    html+=`<div class="playoff-grid">${[{l:"Quarterfinals (Wk 15)",g:PLAYOFF25.filter(g=>g.r==="QF")},{l:"Semifinals (Wk 16)",g:PLAYOFF25.filter(g=>g.r==="SF")},{l:"Championship (Wk 17)",g:PLAYOFF25.filter(g=>g.r==="CHAMP")}].map(round=>`<div><div class="round-label">${round.l}</div><div style="display:flex;flex-direction:column;gap:8px">${round.g.map(g=>matchupCard(g.t1,g.s1,g.t2,g.s2)).join('')}</div></div>`).join('')}</div>`;
  }
  return html;
}

function renderRecords(){
  let html=secTitle('Record Book','All-Time');
  html+=`<div style="margin-bottom:24px"><select class="dropdown" onchange="state.recIdx=Number(this.value);render()">${REC_CATS.map((c,i)=>`<option value="${i}" ${state.recIdx===i?'selected':''}>${c}</option>`).join('')}</select></div>`;
  html+=`<div style="font-size:22px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;margin-bottom:16px">${REC_CATS[state.recIdx]}</div>`;
  const data=REC[REC_CATS[state.recIdx]]||[];
  html+=`<div class="data-table">${data.map((r,i)=>{const mc=i<3?['medal-1','medal-2','medal-3'][i]:'medal-other';return`<div class="record-row"><div class="medal ${mc}">${i+1}</div><div style="flex:2;font-size:13px;font-weight:600;line-height:1.4">${r.t}</div><div style="flex:0.7;font-size:14px;font-weight:800;color:${i<3?'#22d3ee':'#94a3b8'};text-align:right;font-family:'Bebas Neue',sans-serif;letter-spacing:1px">${typeof r.v==='number'?r.v.toFixed(1):r.v}</div><div style="flex:1;font-size:12px;color:#475569;text-align:right">${r.d}</div></div>`;}).join('')}</div>`;
  return html;
}

function renderDraft(){
  const picks=DATA.draft_picks;
  const years=[...new Set(picks.map(p=>p.season))].sort((a,b)=>b-a);
  const yrPicks=picks.filter(p=>p.season===state.draftYear);
  const rounds=[...new Set(yrPicks.map(p=>p.round))].sort((a,b)=>a-b);
  const rdPicks=yrPicks.filter(p=>p.round===state.draftRound);

  let html=secTitle('Draft History',`${picks.length} Total Picks`);
  
  // Year selector
  html+=`<div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center">`;
  html+=`<div style="font-size:13px;color:#64748b;font-weight:700">YEAR:</div>`;
  html+=`<select class="dropdown" style="width:auto;min-width:120px" onchange="state.draftYear=Number(this.value);state.draftRound=1;render()">${years.map(y=>`<option value="${y}" ${state.draftYear===y?'selected':''}>${y}</option>`).join('')}</select>`;
  html+=`<div style="font-size:13px;color:#64748b;font-weight:700;margin-left:12px">ROUND:</div>`;
  html+=`<div class="week-btns">${rounds.map(r=>`<button class="week-btn ${state.draftRound===r?'active':''}" onclick="state.draftRound=${r};render()">${r}</button>`).join('')}</div>`;
  html+=`</div>`;

  html+=`<div style="font-size:18px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;margin-bottom:16px">${state.draftYear} DRAFT — ROUND ${state.draftRound}</div>`;

  html+=`<div class="data-table"><div class="header-row" style="display:grid;grid-template-columns:50px 50px 1fr 60px 1fr"><div>Pick</div><div>Rd</div><div>Player</div><div>Pos</div><div>Team</div></div>`;
  rdPicks.forEach((p,i)=>{
    const posClass=`pos-${p.position||''}`;
    html+=`<div class="draft-row"><div style="font-size:15px;color:#64748b;font-weight:700;font-family:'Bebas Neue',sans-serif">${p.pick}</div><div style="font-size:13px;color:#475569">${p.round}</div><div style="font-size:14px;font-weight:700">${p.player_name}</div><div><span class="pos-badge ${posClass}">${p.position||'—'}</span></div><div style="font-size:13px;color:#64748b">${p.team_name}</div></div>`;
  });
  html+=`</div>`;

  // Draft summary
  if(yrPicks.length){
    const posCounts={};
    yrPicks.forEach(p=>{const pos=p.position||'?';posCounts[pos]=(posCounts[pos]||0)+1;});
    html+=`<div style="margin-top:20px;padding:16px;border-radius:10px;background:rgba(34,211,238,0.05);border:1px solid rgba(34,211,238,0.15);font-size:13px;color:#94a3b8">`;
    html+=`<strong style="color:#22d3ee">${state.draftYear} Draft Summary:</strong> ${yrPicks.length} picks across ${rounds.length} rounds. `;
    html+=`Position breakdown: ${Object.entries(posCounts).sort((a,b)=>b[1]-a[1]).map(([p,c])=>`${p}: ${c}`).join(', ')}`;
    html+=`</div>`;
  }

  return html;
}
