async function loadData(){
  const files=['standings','matchups','draft_picks','champions','team_yearly','head_to_head','playoff_games'];
  for(const f of files){
    try{const r=await fetch(`data/${f}.json`);if(r.ok)DATA[f]=await r.json();}catch(e){console.log(`Could not load ${f}:`,e);}
  }
  initApp();
}

// ══════════════════════════════════════════════════
// APP STATE & RENDERING
// ══════════════════════════════════════════════════
let state={tab:'Overview',subTab:'standings',selWeek:1,recIdx:0,draftYear:2025,draftRound:1,selSeason:2025,sortCol:'record',sortDir:'desc'};

function toggleSort(col){if(state.sortCol===col){state.sortDir=state.sortDir==='desc'?'asc':'desc';}else{state.sortCol=col;state.sortDir='desc';}render();}
function sortArrow(col){if(state.sortCol!==col)return' ↕';return state.sortDir==='desc'?' ▼':' ▲';}
function sortStandings(rows){
  const dir=state.sortDir==='desc'?-1:1;
  return[...rows].sort((a,b)=>{
    const ag=a.wins+a.losses+(a.ties||0),bg=b.wins+b.losses+(b.ties||0);
    switch(state.sortCol){
      case'record':const aw=ag>0?a.wins/ag:0,bw=bg>0?b.wins/bg:0;return aw!==bw?(bw-aw)*dir:(b.wins-a.wins)*dir;
      case'winpct':const ap=ag>0?a.wins/ag:0,bp=bg>0?b.wins/bg:0;return(bp-ap)*dir;
      case'pf':return((b.points_for||0)-(a.points_for||0))*dir;
      case'pa':return((b.points_against||0)-(a.points_against||0))*dir;
      default:return 0;
    }
  });
}

function initApp(){
  renderTabs();
  render();
}

function renderTabs(){
  const tabs=['Overview','Champions','Seasons','Record Book','Draft History','Rules'];
  document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab ${state.tab===t?'active':''}" onclick="state.tab='${t}';render()">${t}</button>`).join('');
}

function secTitle(title,accent){return `<div class="section-title"><h2>${title}</h2>${accent?`<span class="badge">${accent}</span>`:''}<div class="line"></div></div>`;}

function matchupCard(a,as,h,hs){
  const aw=as>hs;
  return `<div class="matchup-card"><div class="matchup-team ${aw?'winner':'loser'}"><span style="color:${aw?'#e2e8f0':'#64748b'};font-weight:${aw?700:400}">${a}</span><span style="color:${aw?'#22d3ee':'#64748b'};font-weight:700">${as}</span></div><div class="matchup-div"></div><div class="matchup-team ${!aw?'winner':'loser'}"><span style="color:${!aw?'#e2e8f0':'#64748b'};font-weight:${!aw?700:400}">${h}</span><span style="color:${!aw?'#22d3ee':'#64748b'};font-weight:700">${hs}</span></div></div>`;
}

function render(){
  renderTabs();
  const el=document.getElementById('content');
  
  if(state.tab==='Overview')el.innerHTML=renderOverview();
  else if(state.tab==='Champions')el.innerHTML=renderChampions();
  else if(state.tab==='Seasons')el.innerHTML=renderSeasons();
  else if(state.tab==='Record Book')el.innerHTML=renderRecords();
  else if(state.tab==='Draft History')el.innerHTML=renderDraft();
  else if(state.tab==='Rules')el.innerHTML=renderConstitution();
}

    const f=franchises[r.franchise];
    f.w+=r.wins;f.l+=r.losses;f.t+=r.ties;f.pf+=r.points_for;f.pa+=r.points_against;f.seasons++;

  html+=`<div style="font-size:11px;color:#475569;margin-top:8px;font-style:italic">* = won with a co-manager/partner</div>`;

function renderSeasons(){
  const yr=state.selSeason;
  const champData=DATA.champions.find(c=>c.season===yr);
  const champName=champData?champData.team_name:'';
  const biggestLoser=champData?champData.biggest_loser:'';
  const runnerUp=champData?champData.runner_up:'';
  const thirdPlace=champData?champData.third_place:'';
  const bootyChamp=champData?champData.booty_bowl_champ:'';

  const subTabs=['standings','weekly','playoffs'];
  let html=secTitle(`${yr} Season`,champName?`Champion: ${champName}`:'');

  // Year selector
  const years=[...new Set(DATA.standings.map(s=>s.season))].sort((a,b)=>b-a);
  html+=`<div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center">`;
  html+=`<div style="font-size:13px;color:#64748b;font-weight:700">YEAR:</div>`;
  html+=`<select class="dropdown" style="width:auto;min-width:120px" onchange="state.selSeason=Number(this.value);state.selWeek=1;render()">${years.map(y=>`<option value="${y}" ${yr===y?'selected':''}>${y}</option>`).join('')}</select>`;
  html+=`</div>`;

  html+=`<div class="sub-tabs">${subTabs.map(s=>`<button class="sub-tab ${state.subTab===s?'active':''}" onclick="state.subTab='${s}';render()">${s==='weekly'?'Week-by-Week':s}</button>`).join('')}</div>`;

  // Season summary bar
  if(champData){
    html+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px">`;
    html+=`<div style="padding:12px;border-radius:10px;background:rgba(250,204,21,0.06);border:1px solid rgba(250,204,21,0.15);text-align:center"><div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">🏆 Champion</div><div style="font-size:13px;font-weight:700;color:#facc15">${champName}</div></div>`;
    if(runnerUp)html+=`<div style="padding:12px;border-radius:10px;background:rgba(148,163,184,0.06);border:1px solid rgba(148,163,184,0.15);text-align:center"><div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Runner-Up</div><div style="font-size:13px;font-weight:600;color:#94a3b8">${runnerUp}</div></div>`;
    if(thirdPlace)html+=`<div style="padding:12px;border-radius:10px;background:rgba(205,127,50,0.06);border:1px solid rgba(205,127,50,0.15);text-align:center"><div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">3rd Place</div><div style="font-size:13px;font-weight:600;color:#cd7f32">${thirdPlace}</div></div>`;
    if(bootyChamp)html+=`<div style="padding:12px;border-radius:10px;background:rgba(34,211,238,0.06);border:1px solid rgba(34,211,238,0.15);text-align:center"><div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Booty Bowl Champ</div><div style="font-size:13px;font-weight:600;color:#22d3ee">${bootyChamp}</div></div>`;
    if(biggestLoser)html+=`<div style="padding:12px;border-radius:10px;background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.15);text-align:center"><div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">💀 Biggest Loser</div><div style="font-size:13px;font-weight:600;color:#f87171">${biggestLoser}</div></div>`;
    html+=`</div>`;
  }

  if(state.subTab==='standings'){
    const stYrRaw=DATA.standings.filter(r=>r.season===yr);
    const stYr=sortStandings(stYrRaw);
    if(stYr.length){
      html+=`<div class="data-table"><div class="standings-grid-25 header-row"><div>#</div><div></div><div>Team</div><div style="text-align:center;cursor:pointer" onclick="toggleSort('record')">Record${sortArrow('record')}</div><div style="text-align:center;cursor:pointer" onclick="toggleSort('winpct')">Win%${sortArrow('winpct')}</div><div style="text-align:right;cursor:pointer" onclick="toggleSort('pf')">PF${sortArrow('pf')}</div><div style="text-align:right;cursor:pointer" class="hide-mobile" onclick="toggleSort('pa')">PA${sortArrow('pa')}</div></div>`;
      stYr.forEach((r,i)=>{const c=tc(r.team_name);const gm=r.wins+r.losses+(r.ties||0);const p=gm>0?(r.wins/gm).toFixed(3):'—';
        html+=`<div class="standings-grid-25" style="${i%2===0?'background:rgba(255,255,255,0.02)':''}"><div style="font-size:14px;color:#64748b;font-weight:700;text-align:center">${i+1}</div><div class="color-bar" style="background:${c};height:24px"></div><div style="font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.team_name}</div><div style="font-size:13px;color:#94a3b8;text-align:center">${r.wins}-${r.losses}${r.ties>0?'-'+r.ties:''}</div><div style="font-size:13px;color:#94a3b8;text-align:center">${p}</div><div style="font-size:13px;color:#22d3ee;text-align:right;font-weight:600">${r.points_for>0?r.points_for.toFixed(1):'—'}</div><div style="font-size:13px;color:#64748b;text-align:right" class="hide-mobile">${r.points_against>0?r.points_against.toFixed(1):'—'}</div></div>`;
      });
      html+=`</div>`;
    } else {
      html+=`<div style="padding:40px;text-align:center;color:#64748b">No standings data for ${yr}</div>`;
    }
  }

  if(state.subTab==='weekly'){
    const mYr=DATA.matchups.filter(r=>r.season===yr&&r.matchup_type==='regular');
    const weeks=[...new Set(mYr.map(r=>r.week))].sort((a,b)=>a-b);
    if(weeks.length){
      html+=`<div class="week-btns">${weeks.map(w=>`<button class="week-btn ${state.selWeek===w?'active':''}" onclick="state.selWeek=${w};render()">${w}</button>`).join('')}</div>`;

      if(wk.length){
        const scores=wk.flatMap(g=>[{t:g.team1_name,s:g.team1_score},{t:g.team2_name,s:g.team2_score}]);
        const hi=scores.reduce((a,b)=>b.s>a.s?b:a);

  if(state.subTab==='playoffs'){
    const pg=DATA.playoff_games.filter(g=>g.season===yr);
    const playoffGames=pg.filter(g=>g.bracket==='playoff');
    const consolGames=pg.filter(g=>g.bracket==='consolation');

    if(playoffGames.length){
      html+=`<div style="font-size:16px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;margin-bottom:12px;color:#e2e8f0">PLAYOFF BRACKET</div>`;
      const rounds=[...new Set(playoffGames.map(g=>g.round))].sort((a,b)=>a-b);
      html+=`<div class="playoff-grid">${rounds.map(rd=>{
        const rdGames=playoffGames.filter(g=>g.round===rd);
        const rdLabel=rdGames[0]?rdGames[0].round_name:'Round '+rd;
        const labels=[...new Set(rdGames.map(g=>g.round_name))];
        return`<div><div class="round-label">${labels.join(' / ')}</div><div style="display:flex;flex-direction:column;gap:8px">${rdGames.map(g=>matchupCard(g.team1,g.score1,g.team2,g.score2)).join('')}</div></div>`;

    }

    if(consolGames.length){
      html+=`<div style="font-size:16px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;margin:32px 0 12px;color:#e2e8f0">BOOTY BOWL</div>`;
      const rounds=[...new Set(consolGames.map(g=>g.round))].sort((a,b)=>a-b);
      html+=`<div class="playoff-grid">${rounds.map(rd=>{
        const rdGames=consolGames.filter(g=>g.round===rd);
        const labels=[...new Set(rdGames.map(g=>g.round_name))];
        return`<div><div class="round-label">${labels.join(' / ')}</div><div style="display:flex;flex-direction:column;gap:8px">${rdGames.map(g=>matchupCard(g.team1,g.score1,g.team2,g.score2)).join('')}</div></div>`;
      }).join('')}</div>`;
    }

    if(!playoffGames.length&&!consolGames.length){
      html+=`<div style="padding:40px;text-align:center;color:#64748b">No playoff data for ${yr}</div>`;
    }
  }
  return html;
}

function renderRecords(){
  let html=secTitle('Record Book','All-Time');
  html+=`<div style="margin-bottom:24px"><select class="dropdown" onchange="state.recIdx=Number(this.value);render()">${REC_CATS.map((c,i)=>`<option value="${i}" ${state.recIdx===i?'selected':''}>${c}</option>`).join('')}</select></div>`;
  html+=`<div style="font-size:22px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;margin-bottom:16px">${REC_CATS[state.recIdx]}</div>`;
  const data=REC[REC_CATS[state.recIdx]]||[];
  html+=`<div class="data-table">${data.map((r,i)=>{const mc=i<3?['medal-1','medal-2','medal-3'][i]:'medal-other';return`<div class="record-row"><div class="medal ${mc}">${i+1}</div><div style="flex:2;font-size:13px;font-weight:600;line-height:1.4">${r.t}</div><div style="flex:0.7;font-size:14px;font-weight:800;color:${i<3?'#22d3ee':'#94a3b8'};text-align:right;font-family:'Bebas Neue',sans-serif;letter-spacing:1px">${typeof r.v==='number'?r.v.toFixed(1):r.v}</div><div style="flex:1;font-size:12px;color:#475569;text-align:right">${r.d}</div></div>`;}).join('')}</div>`;

function renderDraft(){
  const picks=DATA.draft_picks;
  const years=[...new Set(picks.map(p=>p.season))].sort((a,b)=>b-a);
  const yrPicks=picks.filter(p=>p.season===state.draftYear);
  const rounds=[...new Set(yrPicks.map(p=>p.round))].sort((a,b)=>a-b);
  const rdPicks=yrPicks.filter(p=>p.round===state.draftRound);

  let html=secTitle('Draft History',`${picks.length} Total Picks`);
  
  // Year selector
  html+=`<div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center">`;
  html+=`<div style="font-size:13px;color:#64748b;font-weight:700">YEAR:</div>`;
  html+=`<select class="dropdown" style="width:auto;min-width:120px" onchange="state.draftYear=Number(this.value);state.draftRound=1;render()">${years.map(y=>`<option value="${y}" ${state.draftYear===y?'selected':''}>${y}</option>`).join('')}</select>`;
  html+=`<div style="font-size:13px;color:#64748b;font-weight:700;margin-left:12px">ROUND:</div>`;
  html+=`<div class="week-btns">${rounds.map(r=>`<button class="week-btn ${state.draftRound===r?'active':''}" onclick="state.draftRound=${r};render()">${r}</button>`).join('')}</div>`;
  html+=`</div>`;

  html+=`<div style="font-size:18px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;margin-bottom:16px">${state.draftYear} DRAFT — ROUND ${state.draftRound}</div>`;

  html+=`<div class="data-table"><div class="header-row" style="display:grid;grid-template-columns:50px 50px 1fr 60px 1fr"><div>Pick</div><div>Rd</div><div>Player</div><div>Pos</div><div>Team</div></div>`;
  rdPicks.forEach((p,i)=>{
    const posClass=`pos-${p.position||''}`;
    html+=`<div class="draft-row"><div style="font-size:15px;color:#64748b;font-weight:700;font-family:'Bebas Neue',sans-serif">${p.pick}</div><div style="font-size:13px;color:#475569">${p.round}</div><div style="font-size:14px;font-weight:700">${p.player_name}</div><div><span class="pos-badge ${posClass}">${p.position||'—'}</span></div><div style="font-size:13px;color:#64748b">${p.team_name}</div></div>`;
  });
  html+=`</div>`;

  // Draft summary
  if(yrPicks.length){
    const posCounts={};
    yrPicks.forEach(p=>{const pos=p.position||'?';posCounts[pos]=(posCounts[pos]||0)+1;});
    html+=`<div style="margin-top:20px;padding:16px;border-radius:10px;background:rgba(34,211,238,0.05);border:1px solid rgba(34,211,238,0.15);font-size:13px;color:#94a3b8">`;
    html+=`<strong style="color:#22d3ee">${state.draftYear} Draft Summary:</strong> ${yrPicks.length} picks across ${rounds.length} rounds. `;
    html+=`Position breakdown: ${Object.entries(posCounts).sort((a,b)=>b[1]-a[1]).map(([p,c])=>`${p}: ${c}`).join(', ')}`;
    html+=`</div>`;
  }

  return html;
}
