// APP STATE & RENDERING
// ══════════════════════════════════════════════════
let state={tab:'Overview',subTab:'standings',selWeek:1,recIdx:0,draftYear:2025,draftRound:1,selSeason:2025,sortCol:'record',sortDir:'desc'};

function toggleSort(col){if(state.sortCol===col){state.sortDir=state.sortDir==='desc'?'asc':'desc';}else{state.sortCol=col;state.sortDir='desc';}render();}
function sortArrow(col){if(state.sortCol!==col)return' ↕';return state.sortDir==='desc'?' ▼':' ▲';}
function sortStandings(rows){
  const dir=state.sortDir==='desc'?-1:1;
  return[...rows].sort((a,b)=>{
    const ag=a.wins+a.losses+(a.ties||0),bg=b.wins+b.losses+(b.ties||0);
    switch(state.sortCol){
      case'record':const aw=ag>0?a.wins/ag:0,bw=bg>0?b.wins/bg:0;return aw!==bw?(bw-aw)*dir:(b.wins-a.wins)*dir;
      case'winpct':const ap=ag>0?a.wins/ag:0,bp=bg>0?b.wins/bg:0;return(bp-ap)*dir;
      case'pf':return((b.points_for||0)-(a.points_for||0))*dir;
      case'pa':return((b.points_against||0)-(a.points_against||0))*dir;
      default:return 0;
    }
  });
}

function initApp(){
  renderTabs();
  render();
}

function renderTabs(){
  const tabs=['Overview','Teams','Champions','Seasons','Record Book','Draft History','Head-to-Head','Fun Facts','Rules'];
  document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab ${state.tab===t?'active':''}" onclick="state.tab='${t}';render()">${t}</button>`).join('');
}

function secTitle(title,accent){return `<div class="section-title"><h2>${title}</h2>${accent?`<span class="badge">${accent}</span>`:''}<div class="line"></div></div>`;}

function matchupCard(a,as,h,hs){
  const aw=as>hs;
  return `<div class="matchup-card"><div class="matchup-team ${aw?'winner':'loser'}"><span style="color:${aw?'#e2e8f0':'#64748b'};font-weight:${aw?700:400}">${a}</span><span style="color:${aw?'#22d3ee':'#64748b'};font-weight:700">${as}</span></div><div class="matchup-div"></div><div class="matchup-team ${!aw?'winner':'loser'}"><span style="color:${!aw?'#e2e8f0':'#64748b'};font-weight:${!aw?700:400}">${h}</span><span style="color:${!aw?'#22d3ee':'#64748b'};font-weight:700">${hs}</span></div></div>`;
}

function render(){
  renderTabs();
  const el=document.getElementById('content');
  
  if(state.tab==='Overview')el.innerHTML=renderOverview();
  else if(state.tab==='Teams')el.innerHTML=renderTeams();
  else if(state.tab==='Champions')el.innerHTML=renderChampions();
  else if(state.tab==='Seasons')el.innerHTML=renderSeasons();
  else if(state.tab==='Record Book')el.innerHTML=renderRecords();
  else if(state.tab==='Draft History')el.innerHTML=renderDraft();
  else if(state.tab==='Head-to-Head')el.innerHTML=renderH2H();
  else if(state.tab==='Fun Facts')el.innerHTML=renderFunFacts();
  else if(state.tab==='Rules')el.innerHTML=renderConstitution();
}

function renderTeams(){
  let html=secTitle('Teams','Franchise Histories & Records');
  const champLookup={};
  (DATA.champions||[]).forEach(c=>{
    champLookup[c.season]={champion:c.team_name,runner_up:c.runner_up,third:c.third_place,booty:c.booty_bowl_champ,loser:c.biggest_loser};
  });
  function getResult(teamName,season){
    const c=champLookup[season];
    if(!c)return'';
    if(c.champion===teamName)return'🏆 Champion';
    if(c.runner_up===teamName)return'🥈 Runner-Up';
    if(c.third===teamName)return'🥉 3rd Place';
    if(c.booty===teamName)return'🏅 Booty Bowl';
    if(c.loser===teamName)return'💩 Biggest Loser';
    return'';
  }
  // Build franchise groups dynamically from team_yearly
  const frMap={};
  (DATA.team_yearly||[]).forEach(r=>{
    const key=r.franchise||r.team_name;
    if(!frMap[key])frMap[key]={id:key,label:key,rows:[]};
    frMap[key].rows.push(r);
  });
  const FR=Object.values(frMap).map(f=>{
    const rows=f.rows.sort((a,b)=>a.year-b.year);
    const lastYear=rows[rows.length-1].year;
    const currentYear=Math.max(...(DATA.standings||[]).map(s=>s.season));
    const active=lastYear>=currentYear;
    const wins=rows.reduce((s,r)=>s+(r.wins||0),0);
    const losses=rows.reduce((s,r)=>s+(r.losses||0),0);
    const pf=rows.reduce((s,r)=>s+(r.points_for||0),0);
    const managers=[...new Set(rows.map(r=>r.manager).filter(Boolean))];
    const currentManager=rows[rows.length-1].manager||'';
    const titles=rows.filter(r=>{const c=champLookup[r.year];return c&&c.champion===r.team_name;}).map(r=>r.year);
    return{...f,rows,active,wins,losses,pf,seasons:rows.length,managers,currentManager,titles,joined:rows[0].year,left:active?null:lastYear};
  }).sort((a,b)=>{
    if(a.active!==b.active)return a.active?-1:1;
    return b.seasons-a.seasons||a.label.localeCompare(b.label);
  }).map((f,idx)=>({...f,idx}));
  const sel=state.teamsFranchise!=null?state.teamsFranchise:null;
  const showAll=state.teamsShowAll||false;
  if(sel!=null){
    const f=FR[sel];
    if(!f){state.teamsFranchise=null;return renderTeams();}
    html+=`<button onclick="state.teamsFranchise=null;render()" style="margin-bottom:24px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#94a3b8;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px">← All Franchises</button>`;
    const wp=f.wins+f.losses>0?(f.wins/(f.wins+f.losses)).toFixed(3):'—';
    const lastYear=f.rows[f.rows.length-1].year;
    html+=`<div style="margin-bottom:28px">
      <div style="font-size:32px;font-weight:900;font-family:'Bebas Neue',sans-serif;letter-spacing:3px;color:#f1f5f9;margin-bottom:4px">${f.label}</div>
      <div style="font-size:13px;color:#64748b;margin-bottom:20px">${f.currentManager}${!f.active?` · Departed ${f.left||''}`:''} · ${f.joined}${f.active?'–Present':'–'+f.left}</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 20px;text-align:center;min-width:85px">
          <div style="font-size:22px;font-weight:800;color:#f1f5f9">${f.seasons}</div>
          <div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-top:2px">Seasons</div>
        </div>
        <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 20px;text-align:center;min-width:85px">
          <div style="font-size:22px;font-weight:800;color:#f1f5f9">${f.wins}-${f.losses}</div>
          <div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-top:2px">Record</div>
        </div>
        <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 20px;text-align:center;min-width:85px">
          <div style="font-size:22px;font-weight:800;color:#f1f5f9">${wp}</div>
          <div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-top:2px">Win %</div>
        </div>
        <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 20px;text-align:center;min-width:85px">
          <div style="font-size:22px;font-weight:800;color:#f1f5f9">${f.seasons>0?(f.pf/f.seasons).toFixed(1):'—'}</div>
          <div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-top:2px">Avg PF/Season</div>
        </div>
        <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 20px;text-align:center;min-width:85px">
          <div style="font-size:22px;font-weight:800;color:#f59e0b">${f.titles.length||'—'}</div>
          <div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-top:2px">🏆 Title${f.titles.length!==1?'s':''}</div>
        </div>
        ${f.titles.length?`<div style="background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:12px;padding:16px 20px;text-align:center;min-width:85px">
          <div style="font-size:16px;font-weight:800;color:#f59e0b">${f.titles.join(', ')}</div>
          <div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-top:2px">Championship Years</div>
        </div>`:''}
      </div>
    </div>`;
    html+=`<div class="data-table">
      <div style="display:grid;grid-template-columns:55px 1fr 1fr 85px 85px 85px 160px;align-items:center;padding:8px 16px" class="header-row">
        <div>Year</div><div>Team Name</div><div>Manager(s)</div><div style="text-align:center">Record</div><div style="text-align:right">PF</div><div style="text-align:right">PA</div><div>Result</div>
      </div>`;
    f.rows.forEach((r,i)=>{
      const res=getResult(r.team_name,r.year);
      const rc=res.includes('Champion')?'#f59e0b':res.includes('Runner')?'#94a3b8':res.includes('3rd')?'#cd7f32':res.includes('Booty')?'#10b981':res.includes('Biggest')?'#ef4444':'#64748b';
      html+=`<div style="display:grid;grid-template-columns:55px 1fr 1fr 85px 85px 85px 160px;align-items:center;padding:10px 16px;${i%2===0?'background:rgba(255,255,255,0.02)':''}">
        <div style="font-size:13px;font-weight:700;color:#64748b">${r.year}</div>

    </div>`;
    const visible=showAll?FR:FR.filter(f=>f.active);

      html+=`<div onclick="state.teamsFranchise=${f.idx};render()" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden" onmouseover="this.style.background='rgba(255,255,255,0.07)';this.style.borderColor='rgba(34,211,238,0.35)'" onmouseout="this.style.background='rgba(255,255,255,0.04)';this.style.borderColor='rgba(255,255,255,0.08)'">

        <div style="font-size:19px;font-weight:900;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#f1f5f9;margin-bottom:3px;padding-right:${!f.active?'80px':'0'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.label}</div>

  return html;

    if(runnerUp)html+=`<div style="padding:12px;border-radius:10px;background:rgba(148,163,184,0.06);border:1px solid rgba(148,163,184,0.15);text-align:center"><div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Runner-Up</div><div style="font-size:13px;font-weight:600;color:#94a3b8">${runnerUp}</div></div>`;
    if(thirdPlace)html+=`<div style="padding:12px;border-radius:10px;background:rgba(205,127,50,0.06);border:1px solid rgba(205,127,50,0.15);text-align:center"><div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">3rd Place</div><div style="font-size:13px;font-weight:600;color:#cd7f32">${thirdPlace}</div></div>`;
    if(bootyChamp)html+=`<div style="padding:12px;border-radius:10px;background:rgba(34,211,238,0.06);border:1px solid rgba(34,211,238,0.15);text-align:center"><div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Booty Bowl Champ</div><div style="font-size:13px;font-weight:600;color:#22d3ee">${bootyChamp}</div></div>`;
    if(biggestLoser)html+=`<div style="padding:12px;border-radius:10px;background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.15);text-align:center"><div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">💩 Biggest Loser</div><div style="font-size:13px;font-weight:600;color:#f87171">${biggestLoser}</div></div>`;
    html+=`</div>`;
  }

  if(state.subTab==='standings'){
    const stYrRaw=DATA.standings.filter(r=>r.season===yr);
    const stYr=sortStandings(stYrRaw);
    if(stYr.length){
      html+=`<div class="data-table"><div class="standings-grid-25 header-row"><div>#</div><div>Team</div><div style="text-align:center;cursor:pointer" onclick="toggleSort('record')">Record${sortArrow('record')}</div><div style="text-align:center;cursor:pointer" onclick="toggleSort('winpct')">Win%${sortArrow('winpct')}</div><div style="text-align:right;cursor:pointer" onclick="toggleSort('pf')">PF${sortArrow('pf')}</div><div style="text-align:right;cursor:pointer" class="hide-mobile" onclick="toggleSort('pa')">PA${sortArrow('pa')}</div></div>`;
      stYr.forEach((r,i)=>{const gm=r.wins+r.losses+(r.ties||0);const p=gm>0?(r.wins/gm).toFixed(3):'—';
        html+=`<div class="standings-grid-25" style="${i%2===0?'background:rgba(255,255,255,0.02)':''}"><div style="font-size:14px;color:#64748b;font-weight:700;text-align:center">${i+1}</div><div style="font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.team_name}</div><div style="font-size:13px;color:#94a3b8;text-align:center">${r.wins}-${r.losses}${r.ties>0?'-'+r.ties:''}</div><div style="font-size:13px;color:#94a3b8;text-align:center">${p}</div><div style="font-size:13px;color:#22d3ee;text-align:right;font-weight:600">${r.points_for>0?r.points_for.toFixed(1):'—'}</div><div style="font-size:13px;color:#64748b;text-align:right" class="hide-mobile">${r.points_against>0?r.points_against.toFixed(1):'—'}</div></div>`;
      });
      html+=`</div>`;
    } else {
      html+=`<div style="padding:40px;text-align:center;color:#64748b">No standings data for ${yr}</div>`;
    }
  }

  if(state.subTab==='weekly'){
    const mYr=DATA.matchups.filter(r=>r.season===yr&&r.matchup_type==='regular');
    const weeks=[...new Set(mYr.map(r=>r.week))].sort((a,b)=>a-b);
    if(weeks.length){
      html+=`<div class="week-btns">${weeks.map(w=>`<button class="week-btn ${state.selWeek===w?'active':''}" onclick="state.selWeek=${w};render()">${w}</button>`).join('')}</div>`;
      html+=`<div style="font-size:18px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;margin-bottom:16px">WEEK ${state.selWeek} RESULTS</div>`;
      const wk=mYr.filter(r=>r.week===state.selWeek);
      html+=`<div class="matchup-grid">${wk.map(g=>matchupCard(g.team1_name,g.team1_score,g.team2_name,g.team2_score)).join('')}</div>`;
      if(wk.length){
        const scores=wk.flatMap(g=>[{t:g.team1_name,s:g.team1_score},{t:g.team2_name,s:g.team2_score}]);
        const hi=scores.reduce((a,b)=>b.s>a.s?b:a);
        const lo=scores.reduce((a,b)=>b.s<a.s?b:a);
        const diffs=wk.map(g=>Math.abs(g.team1_score-g.team2_score));
        html+=`<div class="week-summary"><div><span style="color:#64748b">Highest: </span><span style="color:#22d3ee;font-weight:700">${hi.s.toFixed(1)}</span> <span style="color:#475569">${hi.t}</span></div><div><span style="color:#64748b">Lowest: </span><span style="color:#f87171;font-weight:700">${lo.s.toFixed(1)}</span> <span style="color:#475569">${lo.t}</span></div><div><span style="color:#64748b">Closest: </span><span style="color:#34d399;font-weight:700">${Math.min(...diffs).toFixed(1)} pts</span></div><div><span style="color:#64748b">Blowout: </span><span style="color:#fb923c;font-weight:700">${Math.max(...diffs).toFixed(1)} pts</span></div></div>`;
      }
    } else {
      html+=`<div style="padding:40px;text-align:center;color:#64748b">No weekly matchup data for ${yr}</div>`;
    }
  }

  if(state.subTab==='playoffs'){
    const pg=DATA.playoff_games.filter(g=>g.season===yr);
    const playoffGames=pg.filter(g=>g.bracket==='playoff');
    const consolGames=pg.filter(g=>g.bracket==='consolation');

    function gameLabel(name){
      if(name==='Championship')return{icon:'🏆',color:'#facc15'};
      if(name==='3rd Place')return{icon:'🥉',color:'#cd7f32'};
      if(name==='Booty Bowl'||name==='Booty Bowl Champ')return{icon:'🚽',color:'#22d3ee'};
      if(name==='Biggest Loser')return{icon:'💩',color:'#f87171'};
      return{icon:'',color:'#94a3b8'};
    }

    function renderBracket(games){
      const rounds=[...new Set(games.map(g=>g.round))].sort((a,b)=>a-b);
      return`<div class="playoff-grid">${rounds.map(rd=>{
        const rdGames=games.filter(g=>g.round===rd);
        const uniqueNames=[...new Set(rdGames.map(g=>g.round_name))];
        if(uniqueNames.length===1){
          return`<div><div class="round-label">${uniqueNames[0]}</div><div style="display:flex;flex-direction:column;gap:8px">${rdGames.map(g=>matchupCard(g.team1,g.score1,g.team2,g.score2)).join('')}</div></div>`;
        } else {
          return`<div><div style="display:flex;flex-direction:column;gap:16px">${rdGames.map(g=>{
            const{icon,color}=gameLabel(g.round_name);
            return`<div><div class="round-label" style="color:${color}">${icon} ${g.round_name}</div>${matchupCard(g.team1,g.score1,g.team2,g.score2)}</div>`;
          }).join('')}</div></div>`;
        }
      }).join('')}</div>`;
    }

    if(playoffGames.length){
      html+=`<div style="font-size:16px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;margin-bottom:12px;color:#e2e8f0">PLAYOFF BRACKET</div>`;
      html+=renderBracket(playoffGames);
    }

    if(consolGames.length){
      html+=`<div style="font-size:16px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;margin:32px 0 12px;color:#e2e8f0">BOOTY BOWL</div>`;
      html+=renderBracket(consolGames);
    }

    if(!playoffGames.length&&!consolGames.length){
      html+=`<div style="padding:40px;text-align:center;color:#64748b">No playoff data for ${yr}</div>`;
    }
  }
  return html;
}

function renderDraft(){
  const picks=DATA.draft_picks;
  const years=[...new Set(picks.map(p=>p.season))].sort((a,b)=>b-a);
  const yrPicks=picks.filter(p=>p.season===state.draftYear);
  const rounds=[...new Set(yrPicks.map(p=>p.round))].sort((a,b)=>a-b);
  const rdPicks=yrPicks.filter(p=>p.round===state.draftRound);

  let html=secTitle('Draft History',`${picks.length} Total Picks`);
  
  // Year selector
  html+=`<div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center">`;
  html+=`<div style="font-size:13px;color:#64748b;font-weight:700">YEAR:</div>`;
  html+=`<select class="dropdown" style="width:auto;min-width:120px" onchange="state.draftYear=Number(this.value);state.draftRound=1;render()">${years.map(y=>`<option value="${y}" ${state.draftYear===y?'selected':''}>${y}</option>`).join('')}</select>`;
  html+=`<div style="font-size:13px;color:#64748b;font-weight:700;margin-left:12px">ROUND:</div>`;
  html+=`<div class="week-btns">${rounds.map(r=>`<button class="week-btn ${state.draftRound===r?'active':''}" onclick="state.draftRound=${r};render()">${r}</button>`).join('')}</div>`;
  html+=`</div>`;

  html+=`<div style="font-size:18px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;margin-bottom:16px">${state.draftYear} DRAFT — ROUND ${state.draftRound}</div>`;

  html+=`<div class="data-table"><div class="header-row" style="display:grid;grid-template-columns:50px 50px 1fr 60px 1fr"><div>Pick</div><div>Rd</div><div>Player</div><div>Pos</div><div>Team</div></div>`;
  rdPicks.forEach((p,i)=>{
    const posClass=`pos-${p.position||''}`;
    html+=`<div class="draft-row"><div style="font-size:15px;color:#64748b;font-weight:700;font-family:'Bebas Neue',sans-serif">${p.pick}</div><div style="font-size:13px;color:#475569">${p.round}</div><div style="font-size:14px;font-weight:700">${p.player_name}</div><div><span class="pos-badge ${posClass}">${p.position||'—'}</span></div><div style="font-size:13px;color:#64748b">${p.team_name}</div></div>`;
  });
  html+=`</div>`;

  // Draft summary
  if(yrPicks.length){
    const posCounts={};
    yrPicks.forEach(p=>{const pos=p.position||'?';posCounts[pos]=(posCounts[pos]||0)+1;});
    html+=`<div style="margin-top:20px;padding:16px;border-radius:10px;background:rgba(34,211,238,0.05);border:1px solid rgba(34,211,238,0.15);font-size:13px;color:#94a3b8">`;
    html+=`<strong style="color:#22d3ee">${state.draftYear} Draft Summary:</strong> ${yrPicks.length} picks across ${rounds.length} rounds. `;
    html+=`Position breakdown: ${Object.entries(posCounts).sort((a,b)=>b[1]-a[1]).map(([p,c])=>`${p}: ${c}`).join(', ')}`;
    html+=`</div>`;
  }

  return html;
}

function renderH2H(){
  const h2h=DATA.head_to_head;
  if(!h2h.length)return'<div style="padding:40px;text-align:center;color:#64748b">No head-to-head data available</div>';
  const franchises=[...new Set(h2h.map(r=>r.franchise))].sort();
  const sel=state.h2hTeam||franchises[0];
  let html=secTitle('Head-to-Head Records','All-Time');
  html+=`<div class="sub-tabs"><button class="sub-tab ${state.h2hView!=='detail'?'active':''}" onclick="state.h2hView='matrix';render()">Matrix</button><button class="sub-tab ${state.h2hView==='detail'?'active':''}" onclick="state.h2hView='detail';render()">Team Detail</button></div>`;

  if(state.h2hView==='detail'){
    html+=`<div style="margin-bottom:20px"><select class="dropdown" onchange="state.h2hTeam=this.value;render()">${franchises.map(f=>`<option value="${f}" ${sel===f?'selected':''}>${f}</option>`).join('')}</select></div>`;
    const teamH2H=h2h.filter(r=>r.franchise===sel).sort((a,b)=>{const ap=a.wins/(a.wins+a.losses||1);const bp=b.wins/(b.wins+b.losses||1);return bp-ap;});
    const totalW=teamH2H.reduce((s,r)=>s+r.wins,0);const totalL=teamH2H.reduce((s,r)=>s+r.losses,0);
    html+=`<div style="font-size:18px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;margin-bottom:16px">${sel} <span style="color:#94a3b8;font-size:14px">${totalW}-${totalL} overall</span></div>`;
    html+=`<div class="data-table"><div style="display:grid;grid-template-columns:1fr 80px 60px 80px;padding:10px 16px;font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:1px;font-weight:700;border-bottom:1px solid rgba(255,255,255,0.06)"><div>Opponent</div><div style="text-align:center">Record</div><div style="text-align:center">Win%</div><div style="text-align:center">Streak</div></div>`;
    teamH2H.forEach((r,i)=>{
      const gm=r.wins+r.losses+(r.ties||0);const pct=gm>0?(r.wins/gm).toFixed(3):'—';
      const domColor=parseFloat(pct)>=0.6?'#34d399':parseFloat(pct)>=0.5?'#22d3ee':parseFloat(pct)>=0.4?'#fb923c':'#f87171';
      const streak=r.streak||'';const streakColor=streak.startsWith('W')?'#34d399':'#f87171';
      html+=`<div style="display:grid;grid-template-columns:1fr 80px 60px 80px;align-items:center;padding:10px 16px;${i%2===0?'background:rgba(255,255,255,0.015)':''}"><div style="font-size:13px;font-weight:600;color:#e2e8f0">${r.opponent}</div><div style="font-size:13px;color:#94a3b8;text-align:center">${r.wins}-${r.losses}${r.ties>0?'-'+r.ties:''}</div><div style="font-size:13px;font-weight:700;color:${domColor};text-align:center">${pct}</div><div style="font-size:12px;font-weight:700;color:${streakColor};text-align:center">${streak}</div></div>`;
    });
    html+=`</div>`;
  } else {
    // Matrix view - color-coded grid
    const lookup={};
    h2h.forEach(r=>{if(!lookup[r.franchise])lookup[r.franchise]={};lookup[r.franchise][r.opponent]={w:r.wins,l:r.losses};});
    // Short names for matrix headers
    const shortNames={};
    franchises.forEach(f=>{
      const words=f.split(/[\s']+/);
      if(f.length<=8)shortNames[f]=f;
      else if(words.length>=2)shortNames[f]=words[0].substring(0,4)+words.length>1?words[words.length-1].substring(0,3):'';
      else shortNames[f]=f.substring(0,7);
    });
    const abbrMap={'1-800-ADMIT-IT':'ADMIT','Blunt Ridaz':'BLUNT','DARK HENRY':'DARK','Go Big Birds':'BIRDS','Jeff/FletcherBaker':'JEFF','London Bridge':'LNDN','Lynchin\' these niggas':'LYNCH','Meat Hammers':'MEAT','Portuguese Conquistadors':'PORT','Rasta Grid':'RASTA','Reality Check':'REAL','Sleepin':'SLEEP','TERIC':'TERIC','THE LORD DOESNT LIVE HERE':'LORD','TaylorMade':'TAYLOR','Your Asia Tature Eks':'ASIA'};

    html+=`<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:24px">`;
    html+=`<table style="border-collapse:collapse;font-size:11px;min-width:${franchises.length*52+120}px">`;
    // Header row
    html+=`<tr><td style="padding:6px 8px;font-weight:700;color:#64748b;position:sticky;left:0;background:#0b1120;z-index:1"></td>`;
    franchises.forEach(f=>{
      const abbr=abbrMap[f]||f.substring(0,5);
      html+=`<td style="padding:4px 2px;text-align:center;font-weight:700;color:#64748b;writing-mode:vertical-lr;transform:rotate(180deg);height:70px;font-size:10px;letter-spacing:0.5px">${abbr}</td>`;
    });
    html+=`</tr>`;
    // Data rows
    franchises.forEach((f,fi)=>{
      const abbr=abbrMap[f]||f.substring(0,5);
      html+=`<tr>`;
      html+=`<td style="padding:6px 8px;font-weight:700;color:#e2e8f0;white-space:nowrap;position:sticky;left:0;background:#0b1120;z-index:1;font-size:11px;border-right:1px solid rgba(255,255,255,0.06)">${abbr}</td>`;
      franchises.forEach((opp,oi)=>{
        if(f===opp){
          html+=`<td style="padding:4px;text-align:center;background:rgba(255,255,255,0.03);font-size:10px;color:#334155">—</td>`;
        } else {
          const rec=lookup[f]&&lookup[f][opp];
          if(rec){
            const total=rec.w+rec.l;
            const pct=total>0?rec.w/total:0.5;
            let bg,fg;
            if(pct>=0.7){bg='rgba(34,197,94,0.3)';fg='#34d399';}
            else if(pct>=0.55){bg='rgba(34,211,238,0.2)';fg='#22d3ee';}
            else if(pct>=0.45){bg='rgba(255,255,255,0.03)';fg='#94a3b8';}
            else if(pct>=0.3){bg='rgba(251,146,60,0.2)';fg='#fb923c';}
            else{bg='rgba(248,113,113,0.25)';fg='#f87171';}
            html+=`<td style="padding:3px;text-align:center;background:${bg};font-size:10px;font-weight:700;color:${fg};cursor:default" title="${f} vs ${opp}: ${rec.w}-${rec.l}">${rec.w}-${rec.l}</td>`;
          } else {
            html+=`<td style="padding:4px;text-align:center;font-size:10px;color:#1e293b">—</td>`;
          }
        }
      });
      html+=`</tr>`;
    });
    html+=`</table></div>`;
    html+=`<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:#64748b;margin-top:8px"><span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:rgba(34,197,94,0.3);vertical-align:middle;margin-right:4px"></span>Dominant (70%+)</span><span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:rgba(34,211,238,0.2);vertical-align:middle;margin-right:4px"></span>Winning (55%+)</span><span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:rgba(255,255,255,0.03);vertical-align:middle;margin-right:4px"></span>Even</span><span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:rgba(251,146,60,0.2);vertical-align:middle;margin-right:4px"></span>Losing (30-45%)</span><span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:rgba(248,113,113,0.25);vertical-align:middle;margin-right:4px"></span>Dominated (<30%)</span></div>`;
  }
  return html;
}
